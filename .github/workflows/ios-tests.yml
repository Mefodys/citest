name: iOS Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Test spawn standalone iOS 26.2
        timeout-minutes: 2
        run: xcrun simctl spawn --standalone 3AB3C7C3-411D-430B-AC79-188511B40314 /usr/bin/true && echo "OK 26.2"

      - name: Test spawn standalone iOS 26.1
        timeout-minutes: 2
        run: xcrun simctl spawn --standalone 488ACAD2-B0E3-48DC-A1DF-53AE667A2FAE /usr/bin/true && echo "OK 26.1"

      - name: Run iOS Simulator Arm64 Tests
        timeout-minutes: 20
        run: ./gradlew :composeApp:iosSimulatorArm64Test --info

      - name: Show device logs
        if: always()
        run: tail -1000 ~/Library/Logs/CoreSimulator/CB3DAAF1-A853-4818-BFF6-1CE5393DBEE7/system.log || echo "no log"

      - name: Find all CoreSimulator logs
        if: always()
        run: find ~/Library/Logs/CoreSimulator -type f 2>/dev/null || echo "nothing found"

      - name: Find daemon logs
        if: always()
        run: |
          echo "=== Gradle daemon ==="
          find ~/.gradle/daemon -type f -name "*.log" 2>/dev/null || echo "not found"
          echo "=== Kotlin daemon ==="
          find /tmp -name "*kotlin*daemon*" -o -name "*daemon*kotlin*" 2>/dev/null || echo "not found"
          find ~/.gradle -name "*kotlin*daemon*" 2>/dev/null || echo "not found"
          echo "=== All gradle logs ==="
          find ~/.gradle -name "*.log" 2>/dev/null

      - name: Upload CoreSimulator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coresimulator-log
          path: /Users/runner/Library/Logs/CoreSimulator/CoreSimulator.log
          if-no-files-found: warn                            
