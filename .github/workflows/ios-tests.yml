name: iOS Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Test spawn standalone iOS 26.2
        timeout-minutes: 2
        run: xcrun simctl spawn --standalone CB3DAAF1-A853-4818-BFF6-1CE5393DBEE7 /usr/bin/true && echo "OK 26.2"

      - name: Test spawn standalone iOS 26.1
        timeout-minutes: 2
        run: xcrun simctl spawn --standalone 3C8FC54B-47D7-4289-95E1-693973B7FFB7 /usr/bin/true && echo "OK 26.1"

      - name: Run iOS Simulator Arm64 Tests
        timeout-minutes: 20
        run: ./gradlew :composeApp:iosSimulatorArm64Test --info

      - name: Upload CoreSimulator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coresimulator-log
          path: /Users/runner/Library/Logs/CoreSimulator/CoreSimulator.log
          if-no-files-found: warn                            
